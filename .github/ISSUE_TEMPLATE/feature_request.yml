name: Feature Request
description: Suggest a feature for the SigRank VS Code Extension
title: "[FEATURE]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Status bar
        - Sidebar dashboard
        - Leaderboard view
        - MCP server bridge
        - Commands
        - Configuration
        - Documentation
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
