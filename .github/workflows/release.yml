name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci
      - run: npm run compile
      - run: npx @vscode/vsce package --no-yarn
      - uses: softprops/action-gh-release@v3
        with:
          files: "*.vsix"
