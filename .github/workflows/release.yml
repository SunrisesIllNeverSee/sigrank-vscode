name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: npm ci
      - run: npm run compile
      - run: npx @vscode/vsce package --no-yarn
      - uses: softprops/action-gh-release@v3
        with:
          files: "*.vsix"
